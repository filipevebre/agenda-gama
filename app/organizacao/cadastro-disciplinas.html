<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda Gama | Nova Disciplina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/styles.css?v=20260507-4">
</head>
<body data-page="disciplinas" data-roles="administrador,funcionarios">
  <div id="app-shell"></div>
  <template id="page-template">
    <section class="page-hero">
      <div>
        <span class="pill">Organização</span>
        <h1>Cadastro de disciplinas</h1>
        <p>Cadastre componentes curriculares em uma página separada da visualização.</p>
      </div>
      <div class="page-actions">
        <article class="info-card">
          <span>Total de disciplinas</span>
          <strong id="total-disciplinas">00</strong>
        </article>
        <a class="btn btn-secondary" href="disciplinas.html">Ver disciplinas cadastradas</a>
      </div>
    </section>
    <section>
      <article class="panel">
        <div class="section-heading"><div><h2>Nova disciplina</h2><p>Cadastre componentes curriculares com carga horária e etapa.</p></div></div>
        <form id="disciplinas-form" class="form-grid">
          <label class="field"><span>Disciplina</span><input name="nome" placeholder="Ex.: Matemática" required></label>
          <label class="field"><span>Carga horária</span><input name="carga" placeholder="Ex.: 4 aulas/semana" required></label>
          <label class="field"><span>Etapa</span><select name="etapa" required><option value="">Selecione</option><option>Educação Infantil</option><option>Ensino Fundamental</option><option>Ensino Médio</option></select></label>
          <button type="submit" class="btn btn-primary full">Salvar disciplina</button>
        </form>
      </article>
    </section>
  </template>
  <script src="../../assets/js/config.js?v=20260415-4"></script>
  <script src="../../assets/js/supabase.js?v=20260507-2"></script>
  <script src="../../assets/js/auth.js?v=20260416-4"></script>
  <script src="../../assets/js/app.js?v=20260507-3"></script>
  <script src="../../assets/js/data-store.js?v=20260507-2"></script>
  <script src="../../assets/js/forms.js?v=20260415-4"></script>
  <script>
    window.AgendaGamaApp.mountShell();
    window.AgendaGamaForms.mountCrud({
      storageKey: "disciplinas",
      formId: "disciplinas-form",
      totalId: "total-disciplinas",
      redirectAfterSubmit: "disciplinas.html",
      cancelRedirect: "disciplinas.html",
      columns: [{ key: "nome" }, { key: "carga" }, { key: "etapa", type: "tag" }],
      seedData: [
        { nome: "Matemática", carga: "4 aulas/semana", etapa: "Ensino Fundamental" },
        { nome: "História", carga: "2 aulas/semana", etapa: "Ensino Fundamental" }
      ]
    });
  </script>
</body>
</html>
