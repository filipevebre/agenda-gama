<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b2147">
  <meta name="application-name" content="Agenda Gama">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Agenda Gama">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
  <title>Agenda Gama | Disciplinas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/styles.css?v=20260514-2">
</head>
<body data-page="disciplinas" data-roles="administrador,funcionarios">
  <div id="app-shell"></div>
  <template id="page-template">
    <section class="page-hero">
      <div>
        <span class="pill">Organização</span>
        <h1>Disciplinas cadastradas</h1>
        <p>Visualize e gerencie os componentes curriculares registrados.</p>
      </div>
      <div class="page-actions">
        <article class="info-card">
          <span>Total de disciplinas</span>
          <strong id="total-disciplinas">00</strong>
        </article>
        <a class="btn btn-primary" href="cadastro-disciplinas.html">Nova disciplina</a>
      </div>
    </section>
    <section>
      <article class="table-card">
        <h3>Disciplinas cadastradas</h3>
        <p>Consulta rápida da grade curricular cadastrada.</p>
        <div class="table-wrapper">
          <table><thead><tr><th>Disciplina</th><th>Carga horária</th><th>Etapa</th></tr></thead><tbody id="disciplinas-table-body"></tbody></table>
        </div>
        <p id="disciplinas-empty" class="empty-state" hidden>Nenhuma disciplina cadastrada ainda.</p>
      </article>
    </section>
  </template>
  <script src="../../assets/js/config.js?v=20260415-4"></script>
  <script src="../../assets/js/supabase.js?v=20260507-2"></script>
  <script src="../../assets/js/auth.js?v=20260416-4"></script>
  <script src="../../assets/js/app.js?v=20260617-2"></script>
  <script src="../../assets/js/data-store.js?v=20260507-2"></script>
  <script src="../../assets/js/forms.js?v=20260415-4"></script>
  <script>
    window.AgendaGamaApp.mountShell();
    window.AgendaGamaForms.mountCrud({
      storageKey: "disciplinas",
      tableBodyId: "disciplinas-table-body",
      emptyStateId: "disciplinas-empty",
      totalId: "total-disciplinas",
      editPageUrl: "cadastro-disciplinas.html",
      emptyMessage: "Nenhuma disciplina cadastrada ainda.",
      columns: [{ key: "nome" }, { key: "carga" }, { key: "etapa", type: "tag" }],
      seedData: [
        { nome: "Matemática", carga: "4 aulas/semana", etapa: "Ensino Fundamental" },
        { nome: "História", carga: "2 aulas/semana", etapa: "Ensino Fundamental" }
      ]
    });
  </script>
  <script src="/assets/js/pwa.js?v=20260617-2"></script>
</body>
</html>
