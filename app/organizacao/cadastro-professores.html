<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda Gama | Novo Professor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/styles.css?v=20260422-4">
</head>
<body data-page="professores" data-roles="administrador,funcionarios">
  <div id="app-shell"></div>
  <template id="page-template">
    <section class="page-hero">
      <div>
        <span class="pill">Organização</span>
        <h1>Cadastro de professores</h1>
        <p>Cadastre ou edite professores em uma página exclusiva de formulário.</p>
      </div>
      <div class="page-actions">
        <article class="info-card">
          <span>Total de professores</span>
          <strong id="total-professores">00</strong>
        </article>
        <a class="btn btn-secondary" href="professores.html">Ver professores cadastrados</a>
      </div>
    </section>
    <section>
      <article class="panel">
        <div class="section-heading"><div><h2>Novo professor</h2><p>Cadastre vínculo docente com uma ou mais disciplinas e e-mail institucional.</p></div></div>
        <form id="professores-form" class="form-grid">
          <label class="field"><span>Nome completo</span><input name="nome" placeholder="Ex.: Helena Souza" required></label>
          <label class="field"><span>Disciplinas</span><select id="professores-disciplinas" name="disciplinas" multiple required></select></label>
          <label class="field"><span>Turno</span><select name="turno" required><option value="">Selecione</option><option>Manhã</option><option>Tarde</option><option>Noite</option><option>Integral</option></select></label>
          <label class="field"><span>E-mail</span><input name="email" type="email" placeholder="professor@escola.com" required></label>
          <p class="muted full">Segure `Ctrl` ou `Cmd` para selecionar mais de uma disciplina.</p>
          <div class="hint-box full">
            <p>Ao salvar, o sistema cria o perfil do professor e envia um convite por e-mail para definir a senha no primeiro acesso.</p>
          </div>
          <button type="submit" class="btn btn-primary full">Salvar professor</button>
          <div id="professor-access-feedback" class="feedback full" aria-live="polite"></div>
        </form>
      </article>
    </section>
  </template>
  <script src="../../assets/js/config.js?v=20260416-5"></script>
  <script src="../../assets/js/supabase.js?v=20260416-6"></script>
  <script src="../../assets/js/auth.js?v=20260416-6"></script>
  <script src="../../assets/js/app.js?v=20260422-5"></script>
  <script src="../../assets/js/data-store.js?v=20260416-5"></script>
  <script src="../../assets/js/forms.js?v=20260416-5"></script>
  <script src="../../assets/js/professores.js?v=20260416-5"></script>
  <script>
    window.AgendaGamaApp.mountShell();
    window.AgendaGamaProfessores.mountCadastroPage();
  </script>
</body>
</html>
