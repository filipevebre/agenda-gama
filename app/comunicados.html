<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b2147">
  <meta name="application-name" content="Agenda Gama">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Agenda Gama">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
  <title>Agenda Gama | Comunicados</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css?v=20260617-7">
</head>
<body data-page="comunicados" data-roles="all">
  <div id="app-shell"></div>

  <template id="page-template">
    <section class="page-hero">
      <div>
        <span class="pill">Comunicados</span>
        <h1>Comunicados gerais da escola</h1>
        <p>Publique avisos importantes e encontre o que precisa com mais rapidez.</p>
      </div>
      <div class="page-actions">
        <a href="comunicados-arquivados.html" class="btn btn-secondary notice-page-link">
          <span class="notice-page-link-icon">AR</span>
          <span>Arquivados</span>
        </a>
        <button id="open-notice-highlights" type="button" class="btn btn-secondary">Destaques</button>
        <button id="open-notice-help" type="button" class="notice-help-trigger" aria-label="Como funciona os comunicados">?</button>
        <button id="notice-open-editor" type="button" class="btn btn-primary">Novo comunicado</button>
      </div>
    </section>

    <section class="stack-sm notices-layout-simple">
      <article class="panel notices-board">
        <div class="section-heading">
          <div>
            <h2>Mural da escola</h2>
            <p>Comunicados recentes e avisos destacados.</p>
          </div>
        </div>

        <div class="toolbar notice-toolbar">
          <label class="field search-field">
            <span>Buscar</span>
            <input id="notice-search" type="search" placeholder="Buscar por titulo, assunto ou texto">
          </label>
          <label class="field">
            <span>Publico</span>
            <select id="notice-audience-filter">
              <option value="all">Todos</option>
              <option value="responsaveis">Responsaveis</option>
              <option value="professores">Professores</option>
              <option value="funcionarios">Equipe interna</option>
            </select>
          </label>
          <label class="field">
            <span>Prioridade</span>
            <select id="notice-priority-filter">
              <option value="all">Todas</option>
              <option value="pinned">Fixados</option>
              <option value="urgent">Urgentes</option>
              <option value="recent">Mais recentes</option>
            </select>
          </label>
          <label class="field">
            <span>Turma</span>
            <select id="notice-turma-filter">
              <option value="all">Todas as turmas</option>
            </select>
          </label>
        </div>

        <p id="notice-board-feedback" class="feedback" role="status" aria-live="polite"></p>
        <div id="notice-list" class="cards-list notice-list"></div>
        <p id="notice-empty" class="empty-state" hidden>Nenhum comunicado encontrado com os filtros atuais.</p>
      </article>
    </section>

    <div id="notice-editor-modal" class="app-modal" hidden>
      <div class="app-modal-backdrop" data-notice-close-modal="true"></div>
      <div class="app-modal-dialog app-modal-dialog-wide" role="dialog" aria-modal="true" aria-labelledby="notice-editor-title">
        <article id="notice-editor-panel" class="panel notice-editor-panel app-modal-panel">
          <div class="app-modal-header">
            <div class="section-heading">
              <div>
                <h2 id="notice-editor-title">Novo comunicado</h2>
                <p>Preencha e publique para o publico certo.</p>
              </div>
            </div>
            <button id="notice-editor-close" type="button" class="btn btn-secondary app-modal-close" aria-label="Fechar comunicado">x</button>
          </div>

          <form id="notice-form" class="stack-sm">
            <label class="field">
              <span>Titulo</span>
              <input id="notice-title" name="title" type="text" maxlength="120" placeholder="Ex.: Reuniao de pais da proxima semana" required>
            </label>

            <label class="field">
              <span>Publico</span>
              <select id="notice-audience" name="audience">
                <option value="all">Toda a escola</option>
                <option value="responsaveis">Responsaveis</option>
                <option value="professores">Professores</option>
                <option value="funcionarios">Equipe interna</option>
              </select>
            </label>

            <label class="field">
              <span>Resumo curto</span>
              <input id="notice-summary" name="summary" type="text" maxlength="160" placeholder="Linha de apoio que aparece no topo do comunicado" required>
            </label>

            <label class="field">
              <span>Conteudo</span>
              <textarea id="notice-body" name="body" rows="7" placeholder="Escreva o comunicado completo aqui." required></textarea>
            </label>

            <label class="field">
              <span>Arquivar a partir de</span>
              <input id="notice-archive-date" name="archiveDate" type="date">
            </label>

            <div class="stack-sm notice-target-block">
              <div class="student-selection-toolbar">
                <div>
                  <strong>Turmas que vao receber</strong>
                  <p class="muted">Selecione uma turma especifica ou varias turmas. Se nao selecionar nenhuma, o comunicado vale para todos os vinculos do publico escolhido.</p>
                </div>
                <div class="toolbar">
                  <button id="notice-turma-select-all" type="button" class="btn btn-secondary btn-sm">Selecionar todas</button>
                  <button id="notice-turma-clear" type="button" class="btn btn-secondary btn-sm">Limpar</button>
                </div>
              </div>
              <div id="notice-turma-target-list" class="student-selection-list notice-turma-selection"></div>
              <p id="notice-turma-target-empty" class="empty-state" hidden>Nenhuma turma cadastrada no momento.</p>
              <p id="notice-turma-target-summary" class="muted"></p>
            </div>

            <div class="notice-editor-options">
              <label class="checkbox-pill">
                <input id="notice-pinned" name="pinned" type="checkbox">
                <span>Fixar no topo</span>
              </label>
              <label class="checkbox-pill">
                <input id="notice-urgent" name="urgent" type="checkbox">
                <span>Marcar como urgente</span>
              </label>
            </div>

            <div class="action-row">
              <button type="submit" class="btn btn-primary">Salvar comunicado</button>
              <button id="notice-cancel" type="button" class="btn btn-secondary">Cancelar</button>
            </div>

            <p id="notice-form-feedback" class="feedback" role="status" aria-live="polite"></p>
          </form>
        </article>
      </div>
    </div>

    <div id="notice-help-modal" class="app-modal" hidden>
      <div class="app-modal-backdrop" data-notice-close-help="true"></div>
      <div class="app-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="notice-help-title">
        <article class="panel app-modal-panel">
          <div class="app-modal-header">
            <div class="section-heading">
              <div>
                <h2 id="notice-help-title">Como funciona</h2>
                <p>Resumo rapido para deixar o mural principal mais limpo.</p>
              </div>
            </div>
            <button id="notice-help-close" type="button" class="btn btn-secondary app-modal-close" aria-label="Fechar ajuda de comunicados">x</button>
          </div>
          <ul class="feature-list">
            <li>Responsaveis veem avisos destinados a familias e a escola toda.</li>
            <li>Professores acompanham orientacoes gerais e avisos pedagogicos.</li>
            <li>Administracao e equipe podem publicar, editar e excluir comunicados.</li>
            <li>Use os filtros do mural para localizar publico, prioridade e turma.</li>
          </ul>
        </article>
      </div>
    </div>

    <div id="notice-highlights-modal" class="app-modal" hidden>
      <div class="app-modal-backdrop" data-notice-close-highlights="true"></div>
      <div class="app-modal-dialog app-modal-dialog-wide" role="dialog" aria-modal="true" aria-labelledby="notice-highlights-title">
        <article class="panel app-modal-panel">
          <div class="app-modal-header">
            <div class="section-heading">
              <div>
                <h2 id="notice-highlights-title">Destaques</h2>
                <p>Resumo rapido do mural e avisos mais importantes.</p>
              </div>
            </div>
            <button id="notice-highlights-close" type="button" class="btn btn-secondary app-modal-close" aria-label="Fechar destaques">x</button>
          </div>

          <section class="status-grid notice-status-grid notice-highlights-stats">
            <article class="status-card">
              <span>Total visivel</span>
              <strong id="notice-stat-total">0</strong>
            </article>
            <article class="status-card">
              <span>Fixados</span>
              <strong id="notice-stat-pinned">0</strong>
            </article>
            <article class="status-card">
              <span>Urgentes</span>
              <strong id="notice-stat-urgent">0</strong>
            </article>
            <article class="status-card">
              <span>Publicados hoje</span>
              <strong id="notice-stat-today">0</strong>
            </article>
          </section>

          <div id="notice-highlight-list" class="stack-sm notice-highlight-list-modal"></div>
          <p id="notice-highlight-empty" class="empty-state" hidden>Nenhum destaque no momento.</p>
        </article>
      </div>
    </div>
  </template>

  <script src="../assets/js/config.js?v=20260415-4"></script>
  <script src="../assets/js/supabase.js?v=20260507-2"></script>
  <script src="../assets/js/auth.js?v=20260619-2"></script>
  <script src="../assets/js/data-store.js?v=20260507-2"></script>
  <script src="../assets/js/app.js?v=20260617-7"></script>
  <script src="../assets/js/comunicados.js?v=20260514-3"></script>
  <script>
    window.AgendaGamaApp.mountShell();
    window.AgendaGamaComunicados.mountComunicados();
  </script>
  <script src="/assets/js/pwa.js?v=20260617-6"></script>
</body>
</html>
