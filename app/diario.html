<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b2147">
  <meta name="application-name" content="Agenda Gama">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Agenda Gama">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
  <title>Agenda Gama | Diario</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css?v=20260514-4">
</head>
<body data-page="diario" data-roles="administrador,funcionarios,professores,responsaveis">
  <div id="app-shell"></div>

  <template id="page-template">
    <section class="page-hero">
      <div>
        <span class="pill">Diario</span>
        <h1>Diario da crianca</h1>
        <p>Registre o dia da crianca e envie para a familia de forma simples.</p>
      </div>
      <div class="page-actions">
        <button id="diario-open-editor" type="button" class="btn btn-primary">Novo registro</button>
        <article class="info-card">
          <span>Registros visiveis</span>
          <strong id="diario-stat-total">0</strong>
        </article>
        <article class="info-card">
          <span>Registros de hoje</span>
          <strong id="diario-stat-today">0</strong>
        </article>
        <article class="info-card">
          <span>Alunos disponiveis</span>
          <strong id="diario-stat-students">0</strong>
        </article>
      </div>
    </section>

    <section class="stack-sm diary-layout-simple">
      <article class="panel diary-board-panel">
        <div class="section-heading">
          <div>
            <h2>Registros enviados</h2>
            <p>Use os filtros para localizar o historico.</p>
          </div>
          <button id="diario-open-help" type="button" class="diary-help-trigger" aria-label="Como funciona o diario">?</button>
        </div>

        <div class="toolbar diary-filter-toolbar">
          <label class="field search-field">
            <span>Buscar</span>
            <input id="diario-search" type="search" placeholder="Buscar por aluno, titulo ou mensagem">
          </label>
          <label class="field">
            <span>Aluno</span>
            <select id="diario-filter-student">
              <option value="all">Todos os alunos</option>
            </select>
          </label>
          <label class="field">
            <span>Categoria</span>
            <select id="diario-filter-category">
              <option value="all">Todas</option>
              <option value="rotina">Rotina</option>
              <option value="alimentacao">Alimentacao</option>
              <option value="atividade">Atividade</option>
              <option value="comportamento">Comportamento</option>
              <option value="saude">Saude</option>
            </select>
          </label>
        </div>

        <p id="diario-board-feedback" class="feedback" role="status" aria-live="polite"></p>
        <div id="diario-list" class="cards-list diary-list"></div>
        <p id="diario-empty" class="empty-state" hidden>Nenhum registro encontrado para os filtros atuais.</p>
      </article>
    </section>

    <div id="diario-help-modal" class="app-modal" hidden>
      <div class="app-modal-backdrop" data-diario-close-help="true"></div>
      <div class="app-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="diario-help-title">
        <article class="panel app-modal-panel diary-help-panel">
          <div class="app-modal-header">
            <div class="section-heading">
              <div>
                <h2 id="diario-help-title">Como funciona o diario</h2>
                <p>Resumo rapido para nao sobrecarregar a tela principal.</p>
              </div>
            </div>
            <button id="diario-help-close" type="button" class="btn btn-secondary app-modal-close" aria-label="Fechar ajuda do diario">x</button>
          </div>
          <div id="diario-access-panel" class="stack-sm"></div>
        </article>
      </div>
    </div>

    <div id="diario-editor-modal" class="app-modal" hidden>
      <div class="app-modal-backdrop" data-diario-close-modal="true"></div>
      <div class="app-modal-dialog app-modal-dialog-wide" role="dialog" aria-modal="true" aria-labelledby="diario-editor-title">
        <article id="diario-editor-panel" class="panel diary-editor-panel app-modal-panel">
          <div class="app-modal-header">
            <div class="section-heading">
              <div>
                <h2 id="diario-editor-title">Novo registro do dia</h2>
                <p id="diario-editor-description">Envie para um aluno, varios alunos ou uma turma.</p>
              </div>
            </div>
            <button id="diario-editor-close" type="button" class="btn btn-secondary app-modal-close" aria-label="Fechar novo registro">x</button>
          </div>

          <form id="diario-form" class="stack-sm">
            <label class="field">
              <span>Destino do envio</span>
              <select id="diario-target-mode" name="targetMode">
                <option value="students">Alunos especificos</option>
                <option value="turmas">Turma inteira</option>
              </select>
            </label>

            <label id="diario-students-field" class="field multi-select-field">
              <span>Filtrar alunos por turma</span>
              <select id="diario-student-turma-filter" name="studentTurmaFilter">
                <option value="all">Todas as turmas</option>
              </select>
            </label>

            <label id="diario-students-target-field" class="field multi-select-field">
              <span>Alunos</span>
              <select id="diario-students-target" name="studentIds" multiple required></select>
            </label>

            <label id="diario-turmas-field" class="field multi-select-field" hidden>
              <span>Turmas</span>
              <select id="diario-turmas-target" name="turmaNames" multiple></select>
            </label>

            <p class="muted">Segure `Ctrl` ou `Cmd` para selecionar mais de um aluno ou mais de uma turma.</p>
            <div id="diario-target-summary" class="diary-target-summary" aria-live="polite"></div>

            <label class="field">
              <span>Categoria</span>
              <select id="diario-category" name="category">
                <option value="rotina">Rotina</option>
                <option value="alimentacao">Alimentacao</option>
                <option value="atividade">Atividade</option>
                <option value="comportamento">Comportamento</option>
                <option value="saude">Saude</option>
              </select>
            </label>

            <label class="field">
              <span>Data do registro</span>
              <input id="diario-date" name="entryDate" type="date" required>
            </label>

            <label class="field">
              <span>Titulo</span>
              <input id="diario-title" name="title" type="text" maxlength="100" placeholder="Ex.: Como foi o dia hoje" required>
            </label>

            <label class="field">
              <span>Mensagem</span>
              <textarea id="diario-body" name="body" rows="7" placeholder="Escreva aqui o resumo do dia da crianca." required></textarea>
            </label>

            <div class="stack-sm diary-upload-block">
              <label class="field">
                <span>Fotos do dia</span>
                <input id="diario-photos" type="file" accept="image/*" multiple>
              </label>
              <p id="diario-upload-hint" class="muted">Voce pode anexar ate 4 fotos por registro.</p>
              <div id="diario-upload-list" class="diary-upload-list" hidden></div>
            </div>

            <div class="action-row">
              <button type="submit" class="btn btn-primary">Enviar para a familia</button>
              <button id="diario-cancel" type="button" class="btn btn-secondary" hidden>Cancelar edicao</button>
            </div>

            <p id="diario-feedback" class="feedback" role="status" aria-live="polite"></p>
          </form>
        </article>
      </div>
    </div>

    <div id="diario-view-modal" class="app-modal" hidden>
      <div class="app-modal-backdrop" data-diario-close-view="true"></div>
      <div class="app-modal-dialog app-modal-dialog-wide" role="dialog" aria-modal="true" aria-labelledby="diario-view-title">
        <article class="panel diary-view-panel app-modal-panel">
          <div class="app-modal-header">
            <div class="section-heading">
              <div>
                <h2 id="diario-view-title">Registro do dia</h2>
                <p id="diario-view-description">Visualize o conteudo completo do diario.</p>
              </div>
            </div>
            <button id="diario-view-close" type="button" class="btn btn-secondary app-modal-close" aria-label="Fechar registro">x</button>
          </div>

          <div id="diario-view-content" class="stack-sm"></div>
          <div id="diario-view-actions" class="action-row" hidden>
            <button id="diario-view-edit" type="button" class="btn btn-primary">Editar registro</button>
            <button id="diario-view-delete" type="button" class="btn btn-secondary">Excluir registro</button>
          </div>
        </article>
      </div>
    </div>
  </template>

  <script src="../assets/js/config.js?v=20260416-7"></script>
  <script src="../assets/js/supabase.js?v=20260507-2"></script>
  <script src="../assets/js/auth.js?v=20260416-7"></script>
  <script src="../assets/js/data-store.js?v=20260507-2"></script>
  <script src="../assets/js/app.js?v=20260617-2"></script>
  <script src="../assets/js/diario.js?v=20260514-4"></script>
  <script>
    window.AgendaGamaApp.mountShell();
    window.AgendaGamaDiario.mountDiario();
  </script>
  <script src="/assets/js/pwa.js?v=20260617-2"></script>
</body>
</html>
