<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b2147">
  <meta name="application-name" content="Agenda Gama">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Agenda Gama">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
  <title>Agenda Gama | Painel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css?v=20260720-1">
</head>
<body data-page="dashboard" data-roles="all">
  <div id="app-shell"></div>

  <template id="page-template">
    <section class="page-hero dashboard-today-hero">
      <div>
        <span id="dashboard-pill" class="pill">Hoje</span>
        <h1 id="dashboard-title">Seu dia na escola</h1>
        <p id="dashboard-description">Carregando as informações mais importantes...</p>
      </div>
      <time id="dashboard-date" class="dashboard-date-card"></time>
    </section>

    <section id="dashboard-students" class="dashboard-student-section" hidden>
      <div class="dashboard-section-heading">
        <div><span>Alunos</span><h2 id="dashboard-students-title">Acompanhamento</h2></div>
      </div>
      <div id="dashboard-student-list" class="dashboard-student-list"></div>
    </section>

    <section id="dashboard-stats" class="dashboard-today-stats">
      <article class="dashboard-today-stat is-primary">
        <span>Para hoje</span>
        <strong id="dashboard-stat-today">0</strong>
        <small>itens importantes</small>
      </article>
      <article class="dashboard-today-stat">
        <span>Pendências</span>
        <strong id="dashboard-stat-pending">0</strong>
        <small>precisam de atenção</small>
      </article>
      <article class="dashboard-today-stat">
        <span id="dashboard-stat-context-label">Alunos visíveis</span>
        <strong id="dashboard-stat-context">0</strong>
        <small id="dashboard-stat-context-note">no seu perfil</small>
      </article>
    </section>

    <section class="dashboard-today-grid">
      <article class="panel dashboard-priority-panel">
        <div class="dashboard-section-heading">
          <div><span>Prioridades</span><h2>O que merece atenção</h2></div>
        </div>
        <div id="dashboard-priority-list" class="dashboard-priority-list"></div>
        <p id="dashboard-priority-empty" class="dashboard-calm-state" hidden>Tudo em ordem por aqui.</p>
      </article>

      <article class="panel dashboard-menu-panel">
        <div class="dashboard-section-heading">
          <div><span>Alimentação</span><h2>Cardápio de hoje</h2></div>
          <a href="cardapio.html">Ver semana</a>
        </div>
        <div id="dashboard-menu-today" class="dashboard-menu-today"></div>
      </article>
    </section>

    <section class="dashboard-quick-section">
      <div class="dashboard-section-heading">
        <div><span>Navegação</span><h2>Acessos rápidos</h2></div>
      </div>
      <div id="dashboard-shortcuts" class="dashboard-compact-shortcuts">
        <a class="dashboard-shortcut-card" href="diario.html">
          <span class="dashboard-shortcut-icon">DR</span>
          <span class="dashboard-shortcut-copy"><strong>Diário</strong><small>Rotina dos alunos</small></span>
        </a>
        <a class="dashboard-shortcut-card" href="atividades.html">
          <span class="dashboard-shortcut-icon">AT</span>
          <span class="dashboard-shortcut-copy"><strong>Atividades</strong><small>Tarefas e prazos</small></span>
        </a>
        <a class="dashboard-shortcut-card" href="comunicacao.html">
          <span class="dashboard-shortcut-icon">CO</span>
          <span class="dashboard-shortcut-copy"><strong>Comunicação</strong><small>Mensagens da escola</small></span>
        </a>
        <a class="dashboard-shortcut-card" href="comunicados.html">
          <span class="dashboard-shortcut-icon">CM</span>
          <span class="dashboard-shortcut-copy"><strong>Comunicados</strong><small>Avisos importantes</small></span>
        </a>
        <a class="dashboard-shortcut-card" href="formularios.html">
          <span class="dashboard-shortcut-icon">FO</span>
          <span class="dashboard-shortcut-copy"><strong>Formulários</strong><small>Autorizações e respostas</small></span>
        </a>
        <a class="dashboard-shortcut-card" href="calendario.html">
          <span class="dashboard-shortcut-icon">CA</span>
          <span class="dashboard-shortcut-copy"><strong>Calendário</strong><small>Datas importantes</small></span>
        </a>
        <a class="dashboard-shortcut-card" href="presenca.html">
          <span class="dashboard-shortcut-icon">FR</span>
          <span class="dashboard-shortcut-copy"><strong>Presença</strong><small>Chamada e frequência</small></span>
        </a>
        <a class="dashboard-shortcut-card" href="notas.html">
          <span class="dashboard-shortcut-icon">NT</span>
          <span class="dashboard-shortcut-copy"><strong>Notas</strong><small>Boletins escolares</small></span>
        </a>
        <a class="dashboard-shortcut-card dashboard-staff-shortcut" href="organizacao/alunos.html">
          <span class="dashboard-shortcut-icon">AL</span>
          <span class="dashboard-shortcut-copy"><strong>Alunos</strong><small>Perfis e matrículas</small></span>
        </a>
      </div>
    </section>
  </template>

  <script src="../assets/js/config.js?v=20260415-4"></script>
  <script src="../assets/js/supabase.js?v=20260507-2"></script>
  <script src="../assets/js/auth.js?v=20260716-1"></script>
  <script src="../assets/js/data-store.js?v=20260720-1"></script>
  <script src="../assets/js/app.js?v=20260720-2"></script>
  <script src="../assets/js/dashboard.js?v=20260720-2"></script>
  <script>
    window.AgendaGamaApp.mountShell();
    window.AgendaGamaDashboard.mountDashboard();
  </script>
  <script src="/assets/js/pwa.js?v=20260716-1"></script>
</body>
</html>
