<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b2a50">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Agenda Gama">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
  <title>Agenda Gama | Formulários</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css?v=20260716-8">
</head>
<body data-page="formularios" data-roles="all">
  <div id="app-shell"></div>

  <template id="page-template">
    <section class="page-hero form-page-hero">
      <div>
        <span class="pill">Formulários</span>
        <h1 id="form-page-title">Formulários da escola</h1>
        <p id="form-page-description">Autorizações, pesquisas e confirmações em um só lugar.</p>
      </div>
      <div class="page-actions">
        <button id="school-form-new" type="button" class="btn btn-primary" hidden>Novo formulário</button>
      </div>
    </section>

    <section class="status-grid school-form-status-grid">
      <article class="status-card">
        <span id="school-form-stat-main-label">Publicados</span>
        <strong id="school-form-stat-main">0</strong>
      </article>
      <article class="status-card">
        <span id="school-form-stat-secondary-label">Respostas</span>
        <strong id="school-form-stat-secondary">0</strong>
      </article>
      <article class="status-card">
        <span id="school-form-stat-pending-label">Pendentes</span>
        <strong id="school-form-stat-pending">0</strong>
      </article>
    </section>

    <section class="panel school-form-board">
      <div class="section-heading school-form-board-heading">
        <div>
          <h2 id="school-form-board-title">Formulários recentes</h2>
          <p id="school-form-board-copy">Acompanhe publicações e respostas das famílias.</p>
        </div>
      </div>

      <div class="toolbar school-form-toolbar">
        <label class="field search-field">
          <span>Buscar</span>
          <input id="school-form-search" type="search" placeholder="Buscar formulário">
        </label>
        <label class="field">
          <span>Situação</span>
          <select id="school-form-status-filter">
            <option value="all">Todas</option>
            <option value="pending">Pendentes</option>
            <option value="answered">Respondidos</option>
            <option value="published">Publicados</option>
            <option value="draft">Rascunhos</option>
            <option value="closed">Encerrados</option>
          </select>
        </label>
        <label class="field">
          <span>Tipo</span>
          <select id="school-form-category-filter">
            <option value="all">Todos</option>
            <option value="autorizacao">Autorização</option>
            <option value="pesquisa">Pesquisa</option>
            <option value="inscricao">Inscrição</option>
            <option value="confirmacao">Confirmação</option>
            <option value="geral">Outro</option>
          </select>
        </label>
      </div>

      <p id="school-form-feedback" class="feedback" role="status" aria-live="polite"></p>
      <div id="school-form-list" class="cards-list school-form-list"></div>
      <p id="school-form-empty" class="empty-state" hidden>Nenhum formulário encontrado.</p>
    </section>

    <div id="school-form-editor-modal" class="app-modal" hidden>
      <div class="app-modal-backdrop" data-school-form-close-editor="true"></div>
      <div class="app-modal-dialog app-modal-dialog-wide school-form-editor-dialog" role="dialog" aria-modal="true" aria-labelledby="school-form-editor-title">
        <article class="panel app-modal-panel">
          <div class="app-modal-header">
            <div class="section-heading">
              <div>
                <h2 id="school-form-editor-title">Novo formulário</h2>
                <p>Monte as perguntas e escolha quem deve responder.</p>
              </div>
            </div>
            <button id="school-form-editor-close" type="button" class="btn btn-secondary app-modal-close" aria-label="Fechar">x</button>
          </div>

          <form id="school-form-editor" class="stack-sm">
            <div class="form-grid school-form-basics">
              <label class="field">
                <span>Título</span>
                <input id="school-form-title" type="text" maxlength="120" placeholder="Ex.: Autorização para passeio" required>
              </label>
              <label class="field">
                <span>Tipo</span>
                <select id="school-form-category">
                  <option value="autorizacao">Autorização</option>
                  <option value="pesquisa">Pesquisa</option>
                  <option value="inscricao">Inscrição</option>
                  <option value="confirmacao">Confirmação</option>
                  <option value="geral">Outro</option>
                </select>
              </label>
              <label class="field school-form-description-field">
                <span>Orientações</span>
                <textarea id="school-form-description" rows="3" maxlength="1000" placeholder="Explique o objetivo e as informações importantes."></textarea>
              </label>
              <label class="field">
                <span>Responder até</span>
                <input id="school-form-closes-at" type="datetime-local">
              </label>
            </div>

            <div class="school-form-target-block">
              <div class="section-heading">
                <div>
                  <h3>Turmas destinatárias</h3>
                  <p>Escolha uma ou mais turmas.</p>
                </div>
                <div class="action-row school-form-mini-actions">
                  <button id="school-form-select-all-turmas" type="button" class="btn btn-secondary btn-sm">Todas</button>
                  <button id="school-form-clear-turmas" type="button" class="btn btn-secondary btn-sm">Limpar</button>
                </div>
              </div>
              <div id="school-form-turma-list" class="school-form-target-list"></div>
              <p id="school-form-turma-empty" class="empty-state" hidden>Nenhuma turma disponível.</p>
            </div>

            <div class="school-form-question-section">
              <div class="section-heading">
                <div>
                  <h3>Perguntas</h3>
                  <p>Organize o que os responsáveis precisam preencher.</p>
                </div>
                <button id="school-form-add-question" type="button" class="btn btn-secondary">Adicionar pergunta</button>
              </div>
              <div id="school-form-question-list" class="school-form-question-list"></div>
            </div>

            <div class="action-row school-form-editor-actions">
              <button type="submit" class="btn btn-primary" data-save-status="published">Publicar</button>
              <button type="submit" class="btn btn-secondary" data-save-status="draft">Salvar rascunho</button>
              <button id="school-form-editor-cancel" type="button" class="btn btn-secondary">Cancelar</button>
            </div>
            <p id="school-form-editor-feedback" class="feedback" role="status" aria-live="polite"></p>
          </form>
        </article>
      </div>
    </div>

    <div id="school-form-answer-modal" class="app-modal" hidden>
      <div class="app-modal-backdrop" data-school-form-close-answer="true"></div>
      <div class="app-modal-dialog app-modal-dialog-wide" role="dialog" aria-modal="true" aria-labelledby="school-form-answer-title">
        <article class="panel app-modal-panel school-form-answer-panel">
          <div class="app-modal-header">
            <div>
              <span id="school-form-answer-category" class="status-badge">Formulário</span>
              <h2 id="school-form-answer-title">Preencher formulário</h2>
              <p id="school-form-answer-description" class="muted"></p>
            </div>
            <button id="school-form-answer-close" type="button" class="btn btn-secondary app-modal-close" aria-label="Fechar">x</button>
          </div>
          <form id="school-form-answer" class="stack-sm">
            <label id="school-form-student-field" class="field">
              <span>Aluno</span>
              <select id="school-form-student" required></select>
            </label>
            <div id="school-form-answer-questions" class="school-form-answer-questions"></div>
            <div class="action-row">
              <button id="school-form-answer-submit" type="submit" class="btn btn-primary">Enviar respostas</button>
              <button id="school-form-answer-cancel" type="button" class="btn btn-secondary">Cancelar</button>
            </div>
            <p id="school-form-answer-feedback" class="feedback" role="status" aria-live="polite"></p>
          </form>
        </article>
      </div>
    </div>

    <div id="school-form-responses-modal" class="app-modal" hidden>
      <div class="app-modal-backdrop" data-school-form-close-responses="true"></div>
      <div class="app-modal-dialog app-modal-dialog-wide" role="dialog" aria-modal="true" aria-labelledby="school-form-responses-title">
        <article class="panel app-modal-panel">
          <div class="app-modal-header">
            <div>
              <h2 id="school-form-responses-title">Respostas</h2>
              <p id="school-form-responses-summary" class="muted"></p>
            </div>
            <button id="school-form-responses-close" type="button" class="btn btn-secondary app-modal-close" aria-label="Fechar">x</button>
          </div>
          <div id="school-form-response-list" class="school-form-response-list"></div>
          <p id="school-form-responses-empty" class="empty-state" hidden>Nenhuma resposta recebida.</p>
        </article>
      </div>
    </div>
  </template>

  <script src="../assets/js/config.js?v=20260415-4"></script>
  <script src="../assets/js/supabase.js?v=20260507-2"></script>
  <script src="../assets/js/auth.js?v=20260716-1"></script>
  <script src="../assets/js/data-store.js?v=20260716-2"></script>
  <script src="../assets/js/app.js?v=20260716-3"></script>
  <script src="../assets/js/school-forms.js?v=20260716-1"></script>
  <script>
    window.AgendaGamaApp.mountShell();
    window.AgendaGamaSchoolForms.mount();
  </script>
  <script src="/assets/js/pwa.js?v=20260716-1"></script>
</body>
</html>
