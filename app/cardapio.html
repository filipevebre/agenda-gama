<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b2a50">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Agenda Gama">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
  <title>Agenda Gama | Cardápio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css?v=20260716-12">
</head>
<body data-page="cardapio" data-roles="all">
  <div id="app-shell"></div>

  <template id="page-template">
    <section class="page-hero menu-page-hero">
      <div>
        <span class="pill">Alimentação</span>
        <h1>Cardápio escolar</h1>
        <p>Café da manhã, almoço e café da tarde de segunda a sexta.</p>
      </div>
      <div class="page-actions">
        <button id="menu-new" type="button" class="btn btn-primary" hidden>Novo cardápio</button>
      </div>
    </section>

    <section class="status-grid menu-status-grid">
      <article class="status-card">
        <span>Dias úteis</span>
        <strong>5</strong>
      </article>
      <article class="status-card">
        <span>Refeições por dia</span>
        <strong>3</strong>
      </article>
      <article class="status-card">
        <span>Período</span>
        <strong id="menu-stat-period">-</strong>
      </article>
    </section>

    <section class="panel menu-board">
      <div class="menu-period-toolbar">
        <label class="field menu-period-field">
          <span>Cardápio vigente</span>
          <select id="menu-period-filter"></select>
        </label>
        <div class="menu-period-copy">
          <small>Validade</small>
          <strong id="menu-period-label"></strong>
        </div>
        <div id="menu-period-actions" class="action-row menu-period-actions" hidden>
          <button id="menu-edit-period" type="button" class="btn btn-secondary btn-sm">Editar</button>
          <button id="menu-publish-period" type="button" class="btn btn-primary btn-sm">Publicar</button>
          <button id="menu-delete-period" type="button" class="btn btn-danger btn-sm">Excluir</button>
        </div>
      </div>

      <p id="menu-feedback" class="feedback" role="status" aria-live="polite"></p>
      <div id="menu-list" class="menu-week-list"></div>
      <p id="menu-empty" class="empty-state" hidden>Nenhum cardápio anual ou semestral cadastrado.</p>
    </section>

    <div id="menu-editor-modal" class="app-modal" hidden>
      <div class="app-modal-backdrop" data-menu-close-editor="true"></div>
      <div class="app-modal-dialog app-modal-dialog-wide menu-editor-dialog" role="dialog" aria-modal="true" aria-labelledby="menu-editor-title">
        <article class="panel app-modal-panel">
          <div class="app-modal-header">
            <div>
              <h2 id="menu-editor-title">Cardápio recorrente</h2>
              <p>Preencha uma semana e escolha se ela valerá para o ano ou semestre.</p>
            </div>
            <button id="menu-editor-close" type="button" class="btn btn-secondary app-modal-close" aria-label="Fechar">x</button>
          </div>

          <form id="menu-editor" class="stack-sm">
            <div class="form-grid menu-editor-basics">
              <label class="field">
                <span>Ano</span>
                <input id="menu-period-year" type="number" min="2020" max="2100" required>
              </label>
              <label class="field">
                <span>Validade</span>
                <select id="menu-period-type">
                  <option value="year">Ano inteiro</option>
                  <option value="semester_1">1º semestre</option>
                  <option value="semester_2">2º semestre</option>
                </select>
              </label>
              <label class="field">
                <span>Público</span>
                <select id="menu-audience">
                  <option value="all">Toda a escola</option>
                  <option value="selected">Turmas específicas</option>
                </select>
              </label>
            </div>

            <div id="menu-target-block" class="menu-target-block" hidden>
              <div class="section-heading">
                <div>
                  <h3>Turmas</h3>
                  <p>Selecione quem poderá visualizar.</p>
                </div>
                <div class="action-row menu-mini-actions">
                  <button id="menu-select-all-turmas" type="button" class="btn btn-secondary btn-sm">Todas</button>
                  <button id="menu-clear-turmas" type="button" class="btn btn-secondary btn-sm">Limpar</button>
                </div>
              </div>
              <div id="menu-turma-list" class="menu-target-list"></div>
              <p id="menu-turma-empty" class="empty-state" hidden>Nenhuma turma cadastrada.</p>
            </div>

            <div class="menu-meal-section">
              <div class="section-heading">
                <div>
                  <h3>Refeições da semana</h3>
                  <p>Os cinco dias ficam organizados no mesmo cadastro.</p>
                </div>
              </div>
              <div class="menu-week-editor-grid">
                <div class="menu-week-editor-head" aria-hidden="true">
                  <span>Dia</span><span>Café da manhã</span><span>Almoço</span><span>Café da tarde</span>
                </div>
                <article class="menu-week-editor-day" data-menu-day="0">
                  <strong>Segunda-feira</strong>
                  <label class="field"><span>Café da manhã</span><textarea data-menu-meal="breakfast" rows="2" maxlength="500" placeholder="Café da manhã"></textarea></label>
                  <label class="field"><span>Almoço</span><textarea data-menu-meal="lunch" rows="2" maxlength="500" placeholder="Almoço"></textarea></label>
                  <label class="field"><span>Café da tarde</span><textarea data-menu-meal="afternoon_snack" rows="2" maxlength="500" placeholder="Café da tarde"></textarea></label>
                </article>
                <article class="menu-week-editor-day" data-menu-day="1">
                  <strong>Terça-feira</strong>
                  <label class="field"><span>Café da manhã</span><textarea data-menu-meal="breakfast" rows="2" maxlength="500" placeholder="Café da manhã"></textarea></label>
                  <label class="field"><span>Almoço</span><textarea data-menu-meal="lunch" rows="2" maxlength="500" placeholder="Almoço"></textarea></label>
                  <label class="field"><span>Café da tarde</span><textarea data-menu-meal="afternoon_snack" rows="2" maxlength="500" placeholder="Café da tarde"></textarea></label>
                </article>
                <article class="menu-week-editor-day" data-menu-day="2">
                  <strong>Quarta-feira</strong>
                  <label class="field"><span>Café da manhã</span><textarea data-menu-meal="breakfast" rows="2" maxlength="500" placeholder="Café da manhã"></textarea></label>
                  <label class="field"><span>Almoço</span><textarea data-menu-meal="lunch" rows="2" maxlength="500" placeholder="Almoço"></textarea></label>
                  <label class="field"><span>Café da tarde</span><textarea data-menu-meal="afternoon_snack" rows="2" maxlength="500" placeholder="Café da tarde"></textarea></label>
                </article>
                <article class="menu-week-editor-day" data-menu-day="3">
                  <strong>Quinta-feira</strong>
                  <label class="field"><span>Café da manhã</span><textarea data-menu-meal="breakfast" rows="2" maxlength="500" placeholder="Café da manhã"></textarea></label>
                  <label class="field"><span>Almoço</span><textarea data-menu-meal="lunch" rows="2" maxlength="500" placeholder="Almoço"></textarea></label>
                  <label class="field"><span>Café da tarde</span><textarea data-menu-meal="afternoon_snack" rows="2" maxlength="500" placeholder="Café da tarde"></textarea></label>
                </article>
                <article class="menu-week-editor-day" data-menu-day="4">
                  <strong>Sexta-feira</strong>
                  <label class="field"><span>Café da manhã</span><textarea data-menu-meal="breakfast" rows="2" maxlength="500" placeholder="Café da manhã"></textarea></label>
                  <label class="field"><span>Almoço</span><textarea data-menu-meal="lunch" rows="2" maxlength="500" placeholder="Almoço"></textarea></label>
                  <label class="field"><span>Café da tarde</span><textarea data-menu-meal="afternoon_snack" rows="2" maxlength="500" placeholder="Café da tarde"></textarea></label>
                </article>
              </div>
            </div>

            <div class="form-grid menu-notes-grid">
              <label class="field">
                <span>Alergênicos</span>
                <textarea id="menu-allergens" rows="3" maxlength="800" placeholder="Ex.: Contém leite, ovos ou glúten"></textarea>
              </label>
              <label class="field">
                <span>Observações</span>
                <textarea id="menu-notes" rows="3" maxlength="1000" placeholder="Substituições ou orientações importantes"></textarea>
              </label>
            </div>

            <div class="action-row menu-editor-actions">
              <button type="submit" class="btn btn-primary" data-save-status="published">Publicar</button>
              <button type="submit" class="btn btn-secondary" data-save-status="draft">Salvar rascunho</button>
              <button id="menu-editor-cancel" type="button" class="btn btn-secondary">Cancelar</button>
            </div>
            <p id="menu-editor-feedback" class="feedback" role="status" aria-live="polite"></p>
          </form>
        </article>
      </div>
    </div>
  </template>

  <script src="../assets/js/config.js?v=20260415-4"></script>
  <script src="../assets/js/supabase.js?v=20260507-2"></script>
  <script src="../assets/js/auth.js?v=20260716-1"></script>
  <script src="../assets/js/data-store.js?v=20260716-5"></script>
  <script src="../assets/js/app.js?v=20260716-5"></script>
  <script src="../assets/js/school-menu.js?v=20260716-3"></script>
  <script>
    window.AgendaGamaApp.mountShell();
    window.AgendaGamaSchoolMenu.mount();
  </script>
  <script src="/assets/js/pwa.js?v=20260716-1"></script>
</body>
</html>
