<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b2a50">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Agenda Gama">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
  <title>Agenda Gama | Atividades</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css?v=20260716-10">
</head>
<body data-page="atividades" data-roles="all">
  <div id="app-shell"></div>

  <template id="page-template">
    <section class="page-hero activity-page-hero">
      <div>
        <span class="pill">Atividades</span>
        <h1 id="activity-page-title">Atividades escolares</h1>
        <p id="activity-page-description">Tarefas e orientações enviadas pelos professores.</p>
      </div>
      <div class="page-actions">
        <button id="activity-new" type="button" class="btn btn-primary" hidden>Nova atividade</button>
      </div>
    </section>

    <section class="status-grid activity-status-grid">
      <article class="status-card">
        <span id="activity-stat-main-label">Publicadas</span>
        <strong id="activity-stat-main">0</strong>
      </article>
      <article class="status-card">
        <span id="activity-stat-secondary-label">Concluídas</span>
        <strong id="activity-stat-secondary">0</strong>
      </article>
      <article class="status-card">
        <span id="activity-stat-pending-label">Pendentes</span>
        <strong id="activity-stat-pending">0</strong>
      </article>
    </section>

    <section class="panel activity-board">
      <div class="section-heading">
        <div>
          <h2 id="activity-board-title">Atividades recentes</h2>
          <p id="activity-board-copy">Abra um cartão para consultar todos os detalhes.</p>
        </div>
      </div>

      <div class="toolbar activity-toolbar">
        <label class="field search-field">
          <span>Buscar</span>
          <input id="activity-search" type="search" placeholder="Buscar atividade ou disciplina">
        </label>
        <label class="field">
          <span>Situação</span>
          <select id="activity-status-filter">
            <option value="all">Todas</option>
            <option value="pending">Pendentes</option>
            <option value="completed">Concluídas</option>
            <option value="published">Publicadas</option>
            <option value="draft">Rascunhos</option>
            <option value="closed">Encerradas</option>
          </select>
        </label>
        <label class="field">
          <span>Disciplina</span>
          <select id="activity-subject-filter">
            <option value="all">Todas</option>
          </select>
        </label>
      </div>

      <p id="activity-feedback" class="feedback" role="status" aria-live="polite"></p>
      <div id="activity-list" class="cards-list activity-list"></div>
      <p id="activity-empty" class="empty-state" hidden>Nenhuma atividade encontrada.</p>
    </section>

    <div id="activity-editor-modal" class="app-modal" hidden>
      <div class="app-modal-backdrop" data-activity-close-editor="true"></div>
      <div class="app-modal-dialog app-modal-dialog-wide activity-editor-dialog" role="dialog" aria-modal="true" aria-labelledby="activity-editor-title">
        <article class="panel app-modal-panel">
          <div class="app-modal-header">
            <div>
              <h2 id="activity-editor-title">Nova atividade</h2>
              <p>Defina a tarefa e escolha as turmas destinatárias.</p>
            </div>
            <button id="activity-editor-close" type="button" class="btn btn-secondary app-modal-close" aria-label="Fechar">x</button>
          </div>

          <form id="activity-editor" class="stack-sm">
            <div class="form-grid activity-basics">
              <label class="field">
                <span>Título</span>
                <input id="activity-title" type="text" maxlength="120" placeholder="Ex.: Exercícios de matemática" required>
              </label>
              <label class="field">
                <span>Disciplina</span>
                <input id="activity-subject" type="text" maxlength="80" list="activity-subject-options" placeholder="Ex.: Matemática" required>
                <datalist id="activity-subject-options"></datalist>
              </label>
              <label class="field activity-description-field">
                <span>Orientações</span>
                <textarea id="activity-description" rows="6" maxlength="4000" placeholder="Explique o que deve ser feito, páginas, materiais e outras orientações." required></textarea>
              </label>
              <label class="field">
                <span>Prazo de entrega</span>
                <input id="activity-due-at" type="datetime-local">
              </label>
              <label class="field">
                <span>Anexos</span>
                <input id="activity-attachments" type="file" accept="image/*,.pdf,.doc,.docx" multiple>
                <small>Até 3 arquivos, com no máximo 2 MB cada.</small>
              </label>
            </div>

            <div id="activity-attachment-list" class="activity-attachment-list" hidden></div>

            <div class="activity-target-block">
              <div class="section-heading">
                <div>
                  <h3>Turmas destinatárias</h3>
                  <p>O professor vê somente as turmas vinculadas ao seu perfil.</p>
                </div>
                <div class="action-row activity-mini-actions">
                  <button id="activity-select-all-turmas" type="button" class="btn btn-secondary btn-sm">Todas</button>
                  <button id="activity-clear-turmas" type="button" class="btn btn-secondary btn-sm">Limpar</button>
                </div>
              </div>
              <div id="activity-turma-list" class="activity-target-list"></div>
              <p id="activity-turma-empty" class="empty-state" hidden>Nenhuma turma disponível.</p>
            </div>

            <div class="action-row activity-editor-actions">
              <button type="submit" class="btn btn-primary" data-save-status="published">Publicar</button>
              <button type="submit" class="btn btn-secondary" data-save-status="draft">Salvar rascunho</button>
              <button id="activity-editor-cancel" type="button" class="btn btn-secondary">Cancelar</button>
            </div>
            <p id="activity-editor-feedback" class="feedback" role="status" aria-live="polite"></p>
          </form>
        </article>
      </div>
    </div>

    <div id="activity-detail-modal" class="app-modal" hidden>
      <div class="app-modal-backdrop" data-activity-close-detail="true"></div>
      <div class="app-modal-dialog app-modal-dialog-wide" role="dialog" aria-modal="true" aria-labelledby="activity-detail-title">
        <article class="panel app-modal-panel activity-detail-panel">
          <div class="app-modal-header">
            <div>
              <span id="activity-detail-subject" class="status-badge">Atividade</span>
              <h2 id="activity-detail-title">Atividade</h2>
              <p id="activity-detail-meta" class="muted"></p>
            </div>
            <button id="activity-detail-close" type="button" class="btn btn-secondary app-modal-close" aria-label="Fechar">x</button>
          </div>
          <div id="activity-detail-body" class="activity-detail-body"></div>
          <div id="activity-detail-attachments" class="activity-detail-attachments"></div>
          <form id="activity-completion-form" class="activity-completion-box" hidden>
            <label class="field">
              <span>Aluno</span>
              <select id="activity-completion-student" required></select>
            </label>
            <button id="activity-completion-submit" type="submit" class="btn btn-primary">Marcar como concluída</button>
            <p id="activity-completion-feedback" class="feedback" role="status" aria-live="polite"></p>
          </form>
        </article>
      </div>
    </div>

    <div id="activity-completions-modal" class="app-modal" hidden>
      <div class="app-modal-backdrop" data-activity-close-completions="true"></div>
      <div class="app-modal-dialog app-modal-dialog-wide" role="dialog" aria-modal="true" aria-labelledby="activity-completions-title">
        <article class="panel app-modal-panel">
          <div class="app-modal-header">
            <div>
              <h2 id="activity-completions-title">Conclusões</h2>
              <p id="activity-completions-summary" class="muted"></p>
            </div>
            <button id="activity-completions-close" type="button" class="btn btn-secondary app-modal-close" aria-label="Fechar">x</button>
          </div>
          <div id="activity-completion-list" class="activity-completion-list"></div>
          <p id="activity-completions-empty" class="empty-state" hidden>Nenhuma conclusão registrada.</p>
        </article>
      </div>
    </div>
  </template>

  <script src="../assets/js/config.js?v=20260415-4"></script>
  <script src="../assets/js/supabase.js?v=20260507-2"></script>
  <script src="../assets/js/auth.js?v=20260716-1"></script>
  <script src="../assets/js/data-store.js?v=20260716-3"></script>
  <script src="../assets/js/app.js?v=20260716-5"></script>
  <script src="../assets/js/school-activities.js?v=20260716-1"></script>
  <script>
    window.AgendaGamaApp.mountShell();
    window.AgendaGamaSchoolActivities.mount();
  </script>
  <script src="/assets/js/pwa.js?v=20260716-1"></script>
</body>
</html>
