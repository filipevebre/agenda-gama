<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda Gama | Comunicacao</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css?v=20260416-5">
</head>
<body data-page="comunicacao" data-roles="all">
  <div id="app-shell"></div>

  <template id="page-template">
    <section class="page-hero">
      <div>
        <span class="pill">Comunicacao</span>
        <h1>Canais da familia</h1>
        <p>Abra um canal, acompanhe os avisos da turma e converse com a escola em um layout mais proximo de uma caixa de entrada.</p>
      </div>
      <div class="page-actions">
        <article class="info-card">
          <span>Canais visiveis</span>
          <strong id="channels-total">00</strong>
        </article>
      </div>
    </section>

    <section class="status-grid">
      <article class="status-card">
        <span>Rascunho</span>
        <strong id="status-rascunho">00</strong>
      </article>
      <article class="status-card">
        <span>Pendente</span>
        <strong id="status-pendente">00</strong>
      </article>
      <article class="status-card">
        <span>Aprovada</span>
        <strong id="status-aprovada">00</strong>
      </article>
      <article class="status-card">
        <span>Enviada</span>
        <strong id="status-enviada">00</strong>
      </article>
    </section>

    <section class="communication-inbox" style="margin-top: 20px;">
      <aside class="panel inbox-sidebar">
        <div class="section-heading">
          <div>
            <h2>Canais da familia</h2>
            <p>Selecione o canal que deseja acompanhar.</p>
          </div>
        </div>

        <div class="communication-search-row">
          <label class="field search-field">
            <span>Buscar canal</span>
            <input id="channel-search" placeholder="Pesquisar canal">
          </label>
          <button type="button" id="toggle-channel-form" class="btn btn-secondary channel-plus-button" title="Criar canal">+</button>
        </div>

        <article id="channel-form-panel" class="hint-box" hidden>
          <div class="section-heading">
            <div>
              <h2>Novo canal</h2>
              <p>Crie um canal vinculado a uma turma.</p>
            </div>
          </div>
          <form id="channel-form" class="stack-md">
            <label class="field">
              <span>Nome do canal</span>
              <input name="nome" placeholder="Ex.: Canal do 1o Ano A" required>
            </label>
            <label class="field">
              <span>Turma vinculada</span>
              <select id="channel-turma" name="publico" required></select>
            </label>
            <label class="field">
              <span>Descricao</span>
              <textarea name="descricao" placeholder="Explique o objetivo deste canal." required></textarea>
            </label>
            <button type="submit" class="btn btn-primary">Criar canal</button>
          </form>
          <div id="channel-feedback" class="feedback" aria-live="polite"></div>
        </article>

        <div id="channel-button-list" class="inbox-channel-list"></div>
        <p id="channel-empty" class="empty-state" hidden>Nenhum canal disponivel para este perfil.</p>
      </aside>

      <section class="panel inbox-board">
        <div class="inbox-topbar">
          <button type="button" id="quick-open-chat" class="btn btn-primary">Nova conversa</button>
          <div id="conversation-tabs" class="inbox-filter-tabs">
            <button type="button" class="conversation-filter active" data-filter="responder">Responder <span id="filter-count-responder" class="filter-count">0</span></button>
            <button type="button" class="conversation-filter" data-filter="aprovar">Aprovar <span id="filter-count-aprovar" class="filter-count">0</span></button>
            <button type="button" class="conversation-filter" data-filter="todas">Todas <span id="filter-count-todas" class="filter-count">0</span></button>
          </div>
        </div>

        <div class="conversation-workspace">
          <div class="conversation-list-column">
            <div id="conversation-list" class="conversation-list"></div>
          </div>

          <div class="conversation-thread-column">
            <div id="thread-header" class="thread-header"></div>
            <div id="thread-meta" class="hint-box" hidden></div>
            <div id="thread-body" class="chat-thread"></div>

            <article id="thread-composer-panel" class="chat-composer" hidden>
              <form id="chat-form" class="stack-md">
                <div id="staff-target-panel" class="stack-md" hidden>
                  <label class="field">
                    <span>Modo de envio</span>
                    <select id="staff-target-mode" name="targetMode">
                      <option value="geral">Enviar para todos os responsaveis da turma</option>
                      <option value="individual">Selecionar responsaveis</option>
                    </select>
                  </label>
                  <label id="staff-target-list-field" class="field" hidden>
                    <span>Responsaveis</span>
                    <select id="staff-target-list" name="targetRecipients" multiple></select>
                  </label>
                  <p id="target-hint" class="muted"></p>
                </div>

                <label class="field">
                  <span>Mensagem</span>
                  <textarea id="chat-message-input" name="content" placeholder="Digite sua mensagem." required></textarea>
                </label>

                <div id="chat-actions" class="toolbar"></div>
              </form>
              <div id="chat-feedback" class="feedback" aria-live="polite"></div>
            </article>
          </div>
        </div>
      </section>
    </section>
  </template>

  <script src="../assets/js/config.js?v=20260416-4"></script>
  <script src="../assets/js/supabase.js?v=20260416-4"></script>
  <script src="../assets/js/auth.js?v=20260416-4"></script>
  <script src="../assets/js/app.js?v=20260416-4"></script>
  <script src="../assets/js/data-store.js?v=20260416-4"></script>
  <script src="../assets/js/communication.js?v=20260416-5"></script>
  <script>
    window.AgendaGamaApp.mountShell();
    window.AgendaGamaCommunication.mountCommunication();
  </script>
</body>
</html>
