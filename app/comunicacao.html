<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda Gama | Central de Mensagens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css?v=20260505-2">
</head>
<body data-page="comunicacao" data-roles="all">
  <div id="app-shell"></div>

  <template id="page-template">
    <section class="message-central-shell">
      <section id="message-central-layout" class="message-central-layout is-board-view">
        <aside class="panel message-sidebar-column">
          <div class="message-sidebar-top clean-sidebar-top">
            <div class="message-sidebar-title">
              <h1>Canais Familia</h1>
              <p>Atendimento escolar por canal e por familia.</p>
            </div>
            <label class="field search-field compact-search-field">
              <span>Buscar conversa</span>
              <input id="message-search-input" type="search" placeholder="Buscar">
            </label>
            <div class="message-sidebar-actions">
              <button type="button" id="open-channel-manager" class="btn btn-secondary btn-sm">Gerenciar canais</button>
            </div>
          </div>

          <div class="message-sidebar-groups">
            <section class="message-sidebar-section">
              <div class="section-heading compact-heading">
                <div>
                  <h2>Canais ativos</h2>
                  <p>Turmas e setores visiveis no seu perfil.</p>
                </div>
              </div>
              <div id="message-channel-list" class="message-channel-list"></div>
            </section>

            <section class="message-sidebar-section message-sidebar-secondary">
              <div class="section-heading compact-heading">
                <div>
                  <h2>Atalhos</h2>
                  <p>Conversas recentes e prioritarias.</p>
                </div>
              </div>
              <div id="sidebar-thread-list" class="message-thread-list"></div>
              <p id="sidebar-thread-empty" class="empty-state" hidden>Nenhuma conversa encontrada.</p>
            </section>
          </div>
        </aside>

        <section class="panel message-board-column">
          <div class="message-board-toolbar">
            <button type="button" id="toggle-new-thread" class="btn btn-primary btn-sm">Nova conversa</button>
            <div class="message-toolbar-stats">
              <span class="message-toolbar-stat">Abertas <strong id="stat-open-count">00</strong></span>
              <span class="message-toolbar-stat">Nao lidas <strong id="stat-unread-count">00</strong></span>
              <span class="message-toolbar-stat">Aprovar <strong id="stat-approval-count">00</strong></span>
            </div>
            <div class="message-view-switcher" aria-label="Alternar painel">
              <button type="button" class="message-view-toggle active" data-view="board">Atendimentos</button>
              <button type="button" class="message-view-toggle" data-view="thread">Conversa</button>
            </div>
          </div>

          <div class="message-board-header">
            <div id="message-tab-bar" class="message-tab-bar clean-tab-bar">
              <button type="button" class="message-tab active" data-tab="responder">Responder <span id="tab-count-responder" class="filter-count">0</span></button>
              <button type="button" class="message-tab" data-tab="aprovar">Aprovar <span id="tab-count-aprovar" class="filter-count">0</span></button>
              <button type="button" class="message-tab" data-tab="todas">Todas <span id="tab-count-todas" class="filter-count">0</span></button>
              <button type="button" class="message-tab" data-tab="arquivadas">Arquivadas <span id="tab-count-arquivadas" class="filter-count">0</span></button>
              <button type="button" class="message-tab" data-tab="nao-lidas">Nao lidas <span id="tab-count-nao-lidas" class="filter-count">0</span></button>
            </div>
          </div>

          <div class="message-filter-grid clean-filter-grid">
            <label class="field compact-field">
              <span>Turma</span>
              <select id="filter-turma"></select>
            </label>
            <label class="field compact-field">
              <span>Setor</span>
              <select id="filter-setor"></select>
            </label>
            <label class="field compact-field">
              <span>Status</span>
              <select id="filter-status"></select>
            </label>
            <label class="field compact-field">
              <span>Leitura</span>
              <select id="filter-unread"></select>
            </label>
          </div>

          <div class="message-board-summary" id="message-board-summary"></div>
          <div class="message-board-list" id="message-board-list"></div>
          <p id="message-board-empty" class="empty-state" hidden>Nenhuma conversa encontrada nesse painel.</p>
        </section>

        <aside class="panel message-thread-column">
          <div class="thread-panel-topbar">
            <div class="thread-topbar-copy">
              <strong>Conversa aberta</strong>
              <span>Volte para a lista quando quiser ver outros chats.</span>
            </div>
            <button type="button" id="thread-back-button" class="btn btn-secondary btn-sm thread-back-button">Voltar aos chats</button>
            <div class="message-view-switcher" aria-label="Alternar painel">
              <button type="button" class="message-view-toggle" data-view="board">Atendimentos</button>
              <button type="button" class="message-view-toggle active" data-view="thread">Conversa</button>
            </div>
          </div>

          <div id="thread-empty-state" class="thread-empty-state">
            <div class="message-empty-illustration">AG</div>
            <h2>Selecione uma conversa</h2>
            <p>Abra um card do painel ou uma conversa na lateral para visualizar o atendimento completo.</p>
          </div>

          <div id="thread-view" class="thread-view" hidden>
            <header id="thread-header-panel" class="thread-header-panel"></header>

            <div id="thread-action-bar" class="thread-action-bar"></div>

            <div id="thread-alerts" class="thread-alerts"></div>

            <section id="thread-body" class="thread-body"></section>

            <aside id="internal-notes-panel" class="internal-notes-panel" hidden>
              <div class="section-heading compact-heading">
                <div>
                  <h2>Observacoes internas</h2>
                  <p>Notas internas visiveis apenas para a escola.</p>
                </div>
              </div>
              <div id="internal-notes-list" class="internal-notes-list"></div>
            </aside>

            <section class="thread-templates-panel">
              <div class="section-heading compact-heading">
                <div>
                  <h2>Respostas rapidas</h2>
                  <p>Modelos prontos para agilizar o atendimento.</p>
                </div>
              </div>
              <div id="quick-template-list" class="quick-template-list"></div>
            </section>

            <form id="thread-composer-form" class="thread-composer-form">
              <div class="composer-toolbar">
                <button type="button" id="attach-message-button" class="btn btn-secondary btn-sm">Anexo</button>
                <button type="button" id="internal-note-button" class="btn btn-secondary btn-sm">Obs. interna</button>
                <button type="button" id="clear-attachments-button" class="btn btn-secondary btn-sm" hidden>Limpar anexos</button>
                <span id="typing-indicator" class="tag" hidden>Digitando...</span>
              </div>

              <input id="thread-attachment-input" type="file" multiple hidden>
              <div id="attachment-preview-list" class="attachment-preview-list" hidden></div>

              <label class="field">
                <span>Mensagem</span>
                <textarea id="thread-message-input" name="message" placeholder="Escreva sua resposta ou observacao interna"></textarea>
              </label>

              <div class="composer-footer">
                <div id="composer-context" class="muted"></div>
                <div class="toolbar">
                  <button type="button" id="save-draft-button" class="btn btn-secondary">Salvar rascunho</button>
                  <button type="submit" id="send-message-button" class="btn btn-primary">Enviar mensagem</button>
                </div>
              </div>
              <div id="thread-composer-feedback" class="feedback" aria-live="polite"></div>
            </form>
          </div>
        </aside>
      </section>

      <div id="new-thread-modal" class="message-modal" hidden>
        <div class="message-modal-backdrop" data-close-new-thread="true"></div>
        <div class="message-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="new-thread-title">
          <article id="new-thread-panel" class="message-new-thread-panel message-new-thread-modal-panel">
            <div class="message-modal-header">
              <div class="section-heading compact-heading">
                <div>
                  <h2 id="new-thread-title">Nova conversa</h2>
                  <p>Abra um novo atendimento com familia, setor ou canal.</p>
                </div>
              </div>
              <button type="button" id="close-new-thread" class="btn btn-secondary message-modal-close" aria-label="Fechar nova conversa">x</button>
            </div>
            <form id="new-thread-form" class="stack-md">
              <label class="field">
                <span>Tipo</span>
                <select id="new-thread-type" name="threadType">
                  <option value="family">Conversa com responsavel</option>
                  <option value="broadcast">Canal da turma</option>
                </select>
              </label>
              <label id="new-thread-channel-field" class="field">
                <span>Canal</span>
                <select id="new-thread-channel" name="channelId"></select>
              </label>
              <label id="new-thread-student-field" class="field">
                <span>Aluno (opcional para filtrar)</span>
                <select id="new-thread-student" name="studentId"></select>
              </label>
              <label id="new-thread-responsavel-field" class="field">
                <span>Responsaveis</span>
                <div class="recipient-picker">
                  <div class="recipient-picker-toolbar">
                    <input id="new-thread-responsavel-search" type="search" placeholder="Buscar responsavel">
                    <div class="toolbar">
                      <button type="button" id="new-thread-select-all" class="btn btn-secondary btn-sm">Todos</button>
                      <button type="button" id="new-thread-clear-selection" class="btn btn-secondary btn-sm">Limpar</button>
                    </div>
                  </div>
                  <div id="new-thread-responsavel-list" class="student-selection-list recipient-selection-list"></div>
                </div>
                <small id="new-thread-selection-summary" class="muted"></small>
              </label>
              <label class="field">
                <span>Setor</span>
                <select id="new-thread-sector" name="sector"></select>
              </label>
              <label class="field">
                <span>Assunto</span>
                <input id="new-thread-subject" name="subject" placeholder="Ex.: Duvida sobre agenda e uniforme">
              </label>
              <p class="muted new-thread-helper">A conversa sera aberta no chat ao lado. A primeira mensagem sera digitada dentro do atendimento.</p>
              <div class="toolbar">
                <button type="submit" class="btn btn-primary">Criar conversa</button>
                <button type="button" id="cancel-new-thread" class="btn btn-secondary">Cancelar</button>
              </div>
            </form>
            <div id="new-thread-feedback" class="feedback" aria-live="polite"></div>
          </article>
        </div>
      </div>

      <div id="channel-manager-modal" class="message-modal" hidden>
        <div class="message-modal-backdrop" data-close-channel-manager="true"></div>
        <div class="message-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="channel-manager-title">
          <section class="message-new-thread-panel message-new-thread-modal-panel channel-manager-panel">
            <div class="message-modal-header">
              <div class="section-heading compact-heading">
                <div>
                  <h2 id="channel-manager-title">Gerenciar canais</h2>
                  <p>Crie novos canais e acompanhe os canais ja cadastrados no sistema.</p>
                </div>
              </div>
              <button type="button" id="close-channel-manager" class="btn btn-secondary message-modal-close" aria-label="Fechar gerenciamento de canais">x</button>
            </div>

            <form id="channel-manager-form" class="stack-md">
              <label class="field">
                <span>Tipo do canal</span>
                <select id="channel-manager-type" name="channelType">
                  <option value="turma">Canal de turma</option>
                  <option value="custom">Canal livre</option>
                </select>
              </label>
              <label class="field">
                <span>Nome do canal</span>
                <input id="channel-manager-name" name="name" placeholder="Ex.: Canal 2o Ano A ou Secretaria infantil">
              </label>
              <label class="field">
                <span>Publico ou turma</span>
                <input id="channel-manager-publico" name="publico" list="channel-manager-publico-options" placeholder="Ex.: 2o Ano A ou Atendimento geral">
                <datalist id="channel-manager-publico-options"></datalist>
              </label>
              <label class="field">
                <span>Descricao</span>
                <textarea id="channel-manager-description" name="description" placeholder="Descreva rapidamente o objetivo do canal."></textarea>
              </label>
              <div class="toolbar">
                <button type="submit" class="btn btn-primary">Criar canal</button>
                <button type="button" id="cancel-channel-manager" class="btn btn-secondary">Fechar</button>
              </div>
            </form>

            <div id="channel-manager-feedback" class="feedback" aria-live="polite"></div>

            <section class="channel-manager-list-section">
              <div class="section-heading compact-heading">
                <div>
                  <h2>Canais cadastrados</h2>
                  <p>Os canais do sistema ficam visiveis para consulta e os canais criados aqui podem ser excluidos.</p>
                </div>
              </div>
              <div id="channel-manager-list" class="channel-manager-list"></div>
            </section>
          </section>
        </div>
      </div>

      <div id="forward-message-modal" class="message-modal" hidden>
        <div class="message-modal-backdrop" data-close-forward-message="true"></div>
        <div class="message-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="forward-message-title">
          <article class="message-new-thread-panel message-new-thread-modal-panel">
            <div class="message-modal-header">
              <div class="section-heading compact-heading">
                <div>
                  <h2 id="forward-message-title">Encaminhar mensagem</h2>
                  <p>Escolha um ou mais responsaveis para receber a mesma mensagem.</p>
                </div>
              </div>
              <button type="button" id="close-forward-message" class="btn btn-secondary message-modal-close" aria-label="Fechar encaminhamento">x</button>
            </div>

            <div id="forward-message-preview" class="thread-start-placeholder"></div>

            <form id="forward-message-form" class="stack-md">
              <label class="field">
                <span>Canal</span>
                <select id="forward-message-channel" name="channelId"></select>
              </label>
              <label class="field">
                <span>Aluno (opcional para filtrar)</span>
                <select id="forward-message-student" name="studentId"></select>
              </label>
              <label class="field">
                <span>Setor</span>
                <select id="forward-message-sector" name="sector"></select>
              </label>
              <label class="field">
                <span>Assunto</span>
                <input id="forward-message-subject" name="subject" placeholder="Ex.: Encaminhamento de recado importante">
              </label>
              <label class="field">
                <span>Responsaveis</span>
                <div class="recipient-picker">
                  <div class="recipient-picker-toolbar">
                    <input id="forward-message-responsavel-search" type="search" placeholder="Buscar responsavel">
                    <div class="toolbar">
                      <button type="button" id="forward-message-select-all" class="btn btn-secondary btn-sm">Todos</button>
                      <button type="button" id="forward-message-clear-selection" class="btn btn-secondary btn-sm">Limpar</button>
                    </div>
                  </div>
                  <div id="forward-message-responsavel-list" class="student-selection-list recipient-selection-list"></div>
                </div>
                <small id="forward-message-selection-summary" class="muted"></small>
              </label>
              <div class="toolbar">
                <button type="submit" class="btn btn-primary">Encaminhar</button>
                <button type="button" id="cancel-forward-message" class="btn btn-secondary">Cancelar</button>
              </div>
            </form>
            <div id="forward-message-feedback" class="feedback" aria-live="polite"></div>
          </article>
        </div>
      </div>
    </section>
  </template>

  <script src="../assets/js/config.js?v=20260417-20"></script>
  <script src="../assets/js/supabase.js?v=20260417-20"></script>
  <script src="../assets/js/auth.js?v=20260417-20"></script>
  <script src="../assets/js/app.js?v=20260505-3"></script>
  <script src="../assets/js/data-store.js?v=20260417-20"></script>
  <script src="../assets/js/communication.js?v=20260505-4"></script>
  <script>
    window.AgendaGamaApp.mountShell();
    window.AgendaGamaCommunication.mountCommunication();
  </script>
</body>
</html>
