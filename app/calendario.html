<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b2147">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
  <title>Agenda Gama | Calendário</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css?v=20260720-2">
  <link rel="stylesheet" href="../assets/css/calendar-attendance.css?v=20260720-1">
</head>
<body data-page="calendario" data-roles="all">
  <div id="app-shell"></div>
  <template id="page-template">
    <section class="page-hero calendar-page-hero">
      <div><span class="pill">Agenda escolar</span><h1>Calendário</h1><p>Eventos, reuniões, provas e datas importantes em um só lugar.</p></div>
      <div class="page-actions"><button id="calendar-new" class="btn btn-primary" type="button" hidden>Novo evento</button></div>
    </section>

    <section class="calendar-stats">
      <article><span>Neste mês</span><strong id="calendar-stat-month">0</strong><small>eventos</small></article>
      <article><span>Importantes</span><strong id="calendar-stat-important">0</strong><small>em destaque</small></article>
      <article><span>Próximos</span><strong id="calendar-stat-upcoming">0</strong><small>nos próximos 7 dias</small></article>
    </section>

    <section class="panel calendar-board">
      <div class="calendar-toolbar">
        <div class="calendar-month-nav">
          <button id="calendar-previous" class="btn btn-secondary btn-sm" type="button" aria-label="Mês anterior">‹</button>
          <strong id="calendar-month-label"></strong>
          <button id="calendar-next" class="btn btn-secondary btn-sm" type="button" aria-label="Próximo mês">›</button>
        </div>
        <label class="field"><span>Tipo</span><select id="calendar-filter-type"><option value="all">Todos</option><option value="evento">Eventos</option><option value="reuniao">Reuniões</option><option value="prova">Provas</option><option value="feriado">Feriados</option><option value="passeio">Passeios</option><option value="entrega">Entregas</option></select></label>
        <label class="field"><span>Turma</span><select id="calendar-filter-turma"><option value="all">Todas</option></select></label>
      </div>
      <p id="calendar-feedback" class="feedback" role="status" aria-live="polite"></p>
      <div class="calendar-weekdays" aria-hidden="true"><span>Dom</span><span>Seg</span><span>Ter</span><span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span></div>
      <div id="calendar-grid" class="calendar-grid"></div>
      <div class="calendar-agenda-heading"><span>Agenda do mês</span><strong id="calendar-agenda-count">0 evento(s)</strong></div>
      <div id="calendar-agenda" class="calendar-agenda"></div>
      <p id="calendar-empty" class="empty-state" hidden>Nenhum evento neste período.</p>
    </section>

    <div id="calendar-editor-modal" class="app-modal" hidden>
      <div class="app-modal-backdrop" data-calendar-close="true"></div>
      <div class="app-modal-dialog app-modal-dialog-wide" role="dialog" aria-modal="true" aria-labelledby="calendar-editor-title">
        <article class="panel app-modal-panel">
          <div class="app-modal-header"><div><h2 id="calendar-editor-title">Novo evento</h2><p>Defina a data e quem poderá visualizar.</p></div><button id="calendar-editor-close" class="btn btn-secondary app-modal-close" type="button" aria-label="Fechar">x</button></div>
          <form id="calendar-editor" class="stack-sm">
            <div class="form-grid calendar-editor-grid">
              <label class="field calendar-title-field"><span>Título</span><input id="calendar-title" maxlength="160" required placeholder="Ex.: Reunião de responsáveis"></label>
              <label class="field"><span>Tipo</span><select id="calendar-type"><option value="evento">Evento</option><option value="reuniao">Reunião</option><option value="prova">Prova</option><option value="feriado">Feriado</option><option value="passeio">Passeio</option><option value="entrega">Entrega</option><option value="outro">Outro</option></select></label>
              <label class="field"><span>Data</span><input id="calendar-date" type="date" required></label>
              <label class="field"><span>Data final</span><input id="calendar-end-date" type="date"></label>
              <label class="field"><span>Horário inicial</span><input id="calendar-start-time" type="time"></label>
              <label class="field"><span>Horário final</span><input id="calendar-end-time" type="time"></label>
              <label class="field calendar-location-field"><span>Local</span><input id="calendar-location" maxlength="160" placeholder="Ex.: Auditório"></label>
            </div>
            <div class="calendar-options-row"><label class="calendar-check"><input id="calendar-all-day" type="checkbox" checked><span>Dia inteiro</span></label><label class="calendar-check"><input id="calendar-important" type="checkbox"><span>Marcar como importante</span></label></div>
            <div class="calendar-target-block"><div class="dashboard-section-heading"><div><span>Público</span><h2>Turmas que verão o evento</h2></div><button id="calendar-clear-turmas" class="btn btn-secondary btn-sm" type="button">Toda a escola</button></div><div id="calendar-turma-list" class="calendar-turma-list"></div><p class="muted">Sem turma selecionada, o evento será visível para toda a escola. Professores devem selecionar suas turmas.</p></div>
            <label class="field"><span>Descrição</span><textarea id="calendar-description" rows="4" maxlength="1600" placeholder="Informações importantes sobre o evento"></textarea></label>
            <div class="action-row calendar-editor-actions"><button class="btn btn-primary" type="submit" data-calendar-status="published">Publicar</button><button class="btn btn-secondary" type="submit" data-calendar-status="draft">Salvar rascunho</button><button id="calendar-editor-cancel" class="btn btn-secondary" type="button">Cancelar</button></div>
            <p id="calendar-editor-feedback" class="feedback" role="status" aria-live="polite"></p>
          </form>
        </article>
      </div>
    </div>

    <div id="calendar-detail-modal" class="app-modal" hidden>
      <div class="app-modal-backdrop" data-calendar-detail-close="true"></div>
      <div class="app-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="calendar-detail-title"><article class="panel app-modal-panel calendar-detail-panel"><div class="app-modal-header"><div><span id="calendar-detail-type" class="pill"></span><h2 id="calendar-detail-title"></h2></div><button id="calendar-detail-close" class="btn btn-secondary app-modal-close" type="button" aria-label="Fechar">x</button></div><div id="calendar-detail-content"></div><div id="calendar-detail-actions" class="action-row" hidden><button id="calendar-detail-edit" class="btn btn-secondary" type="button">Editar</button><button id="calendar-detail-delete" class="btn btn-danger" type="button">Excluir</button></div></article></div>
    </div>
  </template>
  <script src="../assets/js/config.js?v=20260415-4"></script><script src="../assets/js/supabase.js?v=20260507-2"></script><script src="../assets/js/auth.js?v=20260716-1"></script><script src="../assets/js/data-store.js?v=20260720-1"></script><script src="../assets/js/app.js?v=20260720-1"></script><script src="../assets/js/school-calendar.js?v=20260720-1"></script>
  <script>window.AgendaGamaApp.mountShell(); window.AgendaGamaSchoolCalendar.mount();</script><script src="/assets/js/pwa.js?v=20260716-1"></script>
</body>
</html>
